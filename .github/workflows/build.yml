name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Android SDK
        run: |
          echo "Listing SDK platforms:"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "Listing build-tools:"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          echo "sdkmanager list:"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | head -30 || echo "sdkmanager not found"
        shell: bash

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
        shell: bash

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PortScanPro-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
